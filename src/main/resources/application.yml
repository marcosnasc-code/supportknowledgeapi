server:
  port: 8080
  tomcat:
    # Import CSV / indexação de milhares de embeddings: requisição HTTP pode levar horas.
    connection-timeout: 12h
    keep-alive-timeout: 12h

spring:
  config:
    # Carrega .env na raiz do projeto (DB_PASSWORD=postgres, etc.)
    import: optional:file:.env[.properties]
  mvc:
    async:
      request-timeout: 12h
  application:
    name: support-knowledge-api
  datasource:
    url: jdbc:postgresql://localhost:5432/support_knowledge
    username: ${DB_USER:postgres}
    # Docker (compose): postgres. Postgres Windows antigo: defina DB_PASSWORD no .env.
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      # Limite de upload do CSV (export do sistema de suporte pode passar de 100MB).
      max-file-size: 300MB
      max-request-size: 300MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
      cors:
        allowed-origin-patterns:
          - http://localhost:*
          - http://127.0.0.1:*
          - https://*.lovable.app
          - https://*.lovableproject.com
        allowed-methods: GET,OPTIONS
        allowed-headers: "*"
        allow-credentials: true

# Ajuste os nomes das colunas para bater EXATAMENTE com o cabeçalho do CSV exportado.
app:
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - https://*.lovable.app
      - https://*.lovableproject.com
  ollama:
    base-url: http://localhost:11434
    embedding-model: nomic-embed-text
    # Chat para /assist: melhor JSON que 1b. Instalar: ollama pull qwen2.5:7b
    chat-model: qwen2.5:7b
    connect-timeout-seconds: 60
    # Timeout por chamada ao Ollama (cada lote de chunks). Indexar 1000+ pode levar muitos minutos por lote.
    read-timeout-seconds: 7200
  embedding:
    dimension: 768
    # Chunks por chamada ao Ollama (aumente com cautela em máquinas com pouca RAM).
    batch-size: 32
    # nomic-embed-text: ~8192 tokens; logs longos estouram contexto se enviar 6000+ caracteres.
    max-content-chars: 1800
    default-index-limit: 0
  search:
    text-search-config: portuguese
    snippet-max-length: 400
  system-hints:
    resource: classpath:systems-hints.yml
    min-confidence: 0.35
    top-n: 3
    declared-boost-multiplier: 1.5
  assist:
    default-top-k: 10
    max-evidences-for-llm: 12
    default-modo: CITADO_OBRIGATORIO_PARA_SOLUCOES
    default-modo-busca: HYBRID
  import:
    chunk-batch-size: 500
    csv:
      # Use "COMMA" ou "SEMICOLON" conforme o export (Excel BR costuma ser SEMICOLON).
      delimiter: "COMMA"
      # Export do sistema de suporte costuma vir em Windows-1252 (Excel BR). Use UTF-8 se o arquivo for UTF-8.
      charset: "WINDOWS-1252"
      ticket-id-header: "Ref"
      user-description-header: "Descrição"
      public-log-header: "Log público"
      private-log-header: "Log privado"
      final-solution-header: "Solução"

springdoc:
  api-docs:
    path: /api/v1/docs/openapi
  swagger-ui:
    path: /api/v1/docs/swagger-ui
